<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Aible OS</title>
<style>
body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #fff; }
.spinner { width: 20px; height: 20px; border: 2px solid #eee; border-top-color: #333; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading { text-align: center; max-width: 520px; padding: 24px; }
.loading p { font-size: 13px; color: #999; margin-top: 8px; line-height: 1.6; }
.loading code { background:#f5f5f5; padding:2px 6px; border-radius:6px; }
button { margin-top: 14px; padding: 10px 16px; border: 0; border-radius: 10px; background:#111; color:#fff; cursor:pointer; }
button.secondary { background:#f1f1f1; color:#111; margin-left:8px; }
small { display:block; margin-top:10px; color:#999; font-size:12px; }
</style>
</head>
<body>
<div class="loading">
  <div class="spinner"></div>
  <p id="status">正在启动 Aible OS...</p>
  <small id="detail"></small>
  <div id="actions" style="display:none;">
    <button onclick="goApp()">打开主界面</button>
    <button class="secondary" onclick="retry()">重试</button>
  </div>
</div>
<script>
function goApp() {
  location.replace('http://localhost:8765');
}
function retry() {
  location.reload();
}
(async function(){
  const statusEl = document.getElementById('status');
  const detailEl = document.getElementById('detail');
  const actions = document.getElementById('actions');
  let lastError = '';

  for(let i=0; i<20; i++){
    try {
      const r = await fetch('http://localhost:8765/api/health');
      if(r.ok){
        statusEl.textContent = '服务已启动，正在打开主界面...';
        detailEl.textContent = '检测到本地服务 8765 正常响应。';
        setTimeout(goApp, 300);
        return;
      }
      lastError = `health ${r.status}`;
    } catch (e) {
      lastError = e && e.message ? e.message : 'fetch failed';
      statusEl.textContent = '等待本地服务启动中...';
      detailEl.textContent = '正在检测 http://localhost:8765/api/health';
    }
    await new Promise(r=>setTimeout(r,1000));
  }

  statusEl.innerHTML = '本地服务启动失败，当前无法自动进入主界面。';
  detailEl.innerHTML = `未检测到 <code>http://localhost:8765/api/health</code> 正常响应。最后错误：<code>${String(lastError).replace(/</g,'&lt;')}</code><br>请查看 <code>~/aible-debug.log</code> 获取启动日志。`;
  actions.style.display = 'block';
})();
</script>
</body>
</html>
