<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aible OS</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #fff; color: #111; height: 100vh; display: flex; flex-direction: column; }
header { display: flex; justify-content: space-between; align-items: center; padding: 20px 32px; border-bottom: 1px solid #f0f0f0; }
header .logo { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; letter-spacing: -0.3px; }
header .logo .icon { width: 28px; height: 28px; border-radius: 7px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; }
header .logo .icon svg { width: 14px; height: 14px; }
header .date { font-size: 12px; color: #999; }
main { flex: 1; padding: 32px; overflow-y: auto; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
.card { padding: 20px; border-radius: 16px; border: 1px solid #f0f0f0; cursor: pointer; transition: all 0.15s; }
.card:hover { border-color: #ddd; box-shadow: 0 2px 12px rgba(0,0,0,0.04); transform: translateY(-1px); }
.card .icon { font-size: 36px; margin-bottom: 12px; }
.card .name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.card .tag { font-size: 11px; color: #999; }
.empty { text-align: center; padding: 64px 0; color: #999; }
.empty .icon { font-size: 48px; margin-bottom: 16px; }
.empty h2 { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 8px; }
.empty p { font-size: 13px; }
.spinner { width: 20px; height: 20px; border: 2px solid #eee; border-top-color: #333; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.top-actions { display:flex; gap:12px; align-items:center; }
.action-btn { padding: 10px 14px; background:#fff; color:#111; border:1px solid #e8e8e8; border-radius: 12px; cursor:pointer; font-size:13px; }
.action-btn:hover { background:#fafafa; }
.fab { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; background: #1a1a1a; color: #fff; border: none; border-radius: 14px; font-size: 14px; font-weight: 500; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
.fab:hover { background: #333; transform: scale(1.02); }
.store-overlay, .chat-overlay, .settings-overlay { display: none; position: fixed; inset: 0; z-index: 100; }
.store-overlay.show, .chat-overlay.show, .settings-overlay.show { display: block; }
.chat-overlay.show { display:flex; align-items:center; justify-content:center; }
.store-bg, .chat-bg, .settings-bg { position: absolute; inset: 0; background: rgba(0,0,0,0.2); backdrop-filter: blur(2px); }
.store-panel, .settings-panel { position: absolute; right: 0; top: 0; bottom: 0; width: 420px; background: #fff; border-left: 1px solid #f0f0f0; display: flex; flex-direction: column; animation: slideIn 0.25s ease; }
@keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
.store-header, .settings-header { padding: 20px 24px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
.store-header h2, .settings-header h2 { font-size: 16px; font-weight: 600; }
.store-header button, .settings-header button { background: none; border: none; cursor: pointer; color: #999; font-size: 18px; }
.store-list { flex: 1; overflow-y: auto; padding: 16px 24px; }
.store-card { padding: 16px; margin-bottom: 12px; border-radius: 14px; border: 1px solid #f0f0f0; }
.store-card .top { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 8px; }
.store-card .top .icon { font-size: 32px; }
.store-card .top .info h3 { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.store-card .top .info .author { font-size: 11px; color: #999; }
.store-card .desc { font-size: 12px; color: #666; line-height: 1.5; margin-bottom: 12px; }
.store-card .btn { padding: 7px 16px; border-radius: 10px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
.store-card .btn.install { background: #1a1a1a; color: #fff; }
.store-card .btn.install:hover { background: #333; }
.store-card .btn.uninstall { background: #fff; color: #e00; border: 1px solid #fcc; }
.store-card .btn.uninstall:hover { background: #fff5f5; }
.chat-window { position: relative; width: 600px; max-width: 90vw; height: 560px; max-height: 90vh; background: #fff; border-radius: 20px; box-shadow: 0 16px 48px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; margin:auto; top:50%; transform:translateY(-50%); }
.chat-header { padding: 16px 20px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; gap: 10px; }
.chat-header .close { margin-left: auto; background: none; border: none; cursor: pointer; font-size: 18px; color: #999; }
.chat-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
.chat-body .msg { margin-bottom: 12px; display: flex; gap: 8px; }
.chat-body .msg.user { justify-content: flex-end; }
.chat-body .msg.user .bubble { background: #f5f5f5; color: #333; padding: 10px 14px; border-radius: 14px; font-size: 13px; max-width: 80%; line-height: 1.5; }
.chat-body .msg.assistant .bubble { background: #1a1a1a; color: #fff; padding: 10px 14px; border-radius: 14px; font-size: 13px; max-width: 80%; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
.chat-input { padding: 12px 20px; border-top: 1px solid #f0f0f0; display: flex; gap: 8px; }
.chat-input input { flex: 1; padding: 10px 14px; border: 1px solid #eee; border-radius: 12px; font-size: 13px; outline: none; }
.chat-input input:focus { border-color: #ccc; }
.chat-input button { padding: 10px 18px; background: #1a1a1a; color: #fff; border: none; border-radius: 12px; cursor: pointer; font-size: 13px; font-weight: 500; }
.chat-input button:disabled { opacity: 0.5; cursor: default; }
.start-text { text-align: center; color: #999; padding: 32px; font-size: 13px; }
.status { text-align: center; color: #999; padding: 64px 0; font-size: 13px; }
.notice { margin-bottom: 24px; padding: 16px 18px; border: 1px solid #f0e6b8; background: #fffbea; border-radius: 14px; }
.notice h3 { font-size: 14px; margin-bottom: 6px; }
.notice p { font-size: 12px; color: #6b5f2a; line-height: 1.6; }
.notice code { background:#f5efd0; padding:2px 6px; border-radius:6px; }
.diag { margin-top: 28px; border: 1px solid #f0f0f0; border-radius: 16px; padding: 18px; background:#fafafa; }
.diag h3 { font-size: 14px; margin-bottom: 12px; }
.diag-grid { display: grid; grid-template-columns: 180px 1fr; gap: 8px 12px; font-size: 12px; }
.diag-grid .k { color:#666; }
.diag-grid .v { color:#111; word-break: break-all; }
.pill { display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px; background:#eee; }
.pill.ok { background:#e8f7ea; color:#1f7a35; }
.pill.no { background:#fdecec; color:#b42318; }
.settings-body { padding: 20px 24px; display:flex; flex-direction:column; gap:16px; }
.field label { display:block; font-size:12px; color:#666; margin-bottom:6px; }
.field input { width:100%; padding:11px 12px; border:1px solid #e8e8e8; border-radius:12px; font-size:13px; outline:none; }
.field input:focus { border-color:#bbb; }
.settings-save { padding: 12px 16px; background:#111; color:#fff; border:none; border-radius:12px; cursor:pointer; font-size:13px; }
.settings-hint { font-size:12px; color:#777; line-height:1.6; }
.settings-status { font-size:12px; color:#0a7a33; }
.settings-status.error { color:#b42318; }
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="icon">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <rect x="1" y="1" width="5" height="5" rx="1" fill="white"/>
        <rect x="8" y="1" width="5" height="5" rx="1" fill="white"/>
        <rect x="1" y="8" width="5" height="5" rx="1" fill="white"/>
        <rect x="8" y="8" width="5" height="5" rx="1" fill="white"/>
      </svg>
    </div>Aible OS
  </div>
  <div class="top-actions">
    <button class="action-btn" onclick="toggleSettings()">设置</button>
    <div class="date" id="date"></div>
  </div>
</header>
<main>
  <div class="notice" id="llmNotice" style="display:none;">
    <h3>需要配置 LLM API Key</h3>
    <p>当前未检测到可用的 LLM 配置。你仍然可以看到桌面和应用商店，但聊天类应用不会返回真实 AI 结果。请点击右上角 <code>设置</code>，填写 API Key / Base URL / Model 后保存。</p>
  </div>
  <div id="desktop"></div>
  </main>
<button class="fab" onclick="toggleStore()">+ 应用商店</button>

<div class="store-overlay" id="storeOverlay">
  <div class="store-bg" onclick="toggleStore()"></div>
  <div class="store-panel">
    <div class="store-header">
      <h2>应用商店</h2>
      <button onclick="toggleStore()">✕</button>
    </div>
    <div class="store-list" id="storeList"><div class="spinner"></div></div>
  </div>
</div>

<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-bg" onclick="toggleSettings()"></div>
  <div class="settings-panel">
    <div class="settings-header">
      <h2>模型设置</h2>
      <button onclick="toggleSettings()">✕</button>
    </div>
    <div class="settings-body">
      <div class="field">
        <label>LLM API Key</label>
        <input id="apiKeyInput" type="password" placeholder="输入你的 API Key">
      </div>
      <div class="field">
        <label>Base URL</label>
        <input id="baseUrlInput" type="text" placeholder="https://open.bigmodel.cn/api/paas/v4">
      </div>
      <div class="field">
        <label>Model</label>
        <input id="modelInput" type="text" placeholder="glm-4-plus">
      </div>
      <button class="settings-save" onclick="saveSettings()">保存设置</button>
      <div class="settings-status" id="settingsStatus"></div>
      <div class="settings-hint">配置会保存到本机用户目录，打包 app 不再内置你的密钥。保存后关闭并重新打开 Aible OS，即可让 AI 应用使用新的模型配置。</div>
    </div>
  </div>
</div>

<div class="chat-overlay" id="chatOverlay">
  <div class="chat-bg" onclick="closeChat()"></div>
  <div class="chat-window">
    <div class="chat-header">
      <span id="chatIcon"></span>
      <strong id="chatName"></strong>
      <button class="close" onclick="closeChat()">✕</button>
    </div>
    <div class="chat-body" id="chatBody"><p class="start-text">开始对话吧 ✨</p></div>
    <div class="chat-input">
      <input id="chatInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendMsg()">
      <button onclick="sendMsg()">发送</button>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8765';
let installed = [];
let catalog = [];
let activeApp = null;
let sessionId = null;
let settings = null;

document.getElementById('date').textContent = new Date().toLocaleDateString('zh-CN', {month:'long',day:'numeric',weekday:'short'});

async function init() {
  const desktop = document.getElementById('desktop');
  desktop.innerHTML = '<div class="status"><div class="spinner"></div>正在启动服务...</div>';

  for (let i = 0; i < 20; i++) {
    try {
      const r = await fetch(`${API}/api/health`);
      if (r.ok) break;
    } catch {}
    await new Promise(r => setTimeout(r, 1000));
  }

  await loadSettings();
  await loadDesktop();
}

async function apiFetch(path, opts = {}) {
  const res = await fetch(`${API}${path}`, opts);
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.json();
}

async function loadSettings() {
  try {
    settings = await apiFetch('/api/settings');
    document.getElementById('apiKeyInput').value = settings.llm_api_key || '';
    document.getElementById('baseUrlInput').value = settings.llm_base_url || 'https://open.bigmodel.cn/api/paas/v4';
    document.getElementById('modelInput').value = settings.llm_model || 'glm-4-plus';
    document.getElementById('llmNotice').style.display = settings.llm_configured ? 'none' : 'block';
  } catch (e) {
    document.getElementById('llmNotice').style.display = 'block';
  }
}

async function saveSettings() {
  const status = document.getElementById('settingsStatus');
  status.className = 'settings-status';
  status.textContent = '保存中...';
  try {
    const payload = {
      llm_api_key: document.getElementById('apiKeyInput').value,
      llm_base_url: document.getElementById('baseUrlInput').value,
      llm_model: document.getElementById('modelInput').value,
    };
    const result = await apiFetch('/api/settings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    settings = result;
    status.textContent = '✅ 已保存，配置已生效（无需重启）';
    document.getElementById('llmNotice').style.display = result.llm_configured ? 'none' : 'block';
  } catch (e) {
    status.className = 'settings-status error';
    status.textContent = '保存失败：' + e.message;
  }
}

function toggleSettings() {
  const ov = document.getElementById('settingsOverlay');
  ov.classList.toggle('show');
}

async function loadDesktop() {
  try {
    installed = await apiFetch('/api/apps/installed');
  } catch { installed = []; }
  renderDesktop();
}

function renderDesktop() {
  const d = document.getElementById('desktop');
  if (installed.length === 0) {
    d.innerHTML = '<div class="empty"><div class="icon">📦</div><h2>桌面还是空的</h2><p>从应用商店安装你的第一个 App</p></div>';
    return;
  }
  d.innerHTML = '<div class="grid">' + installed.map(a => `
    <div class="card" onclick="openApp('${a.app_id}','${a.display_name}','${a.icon}')">
      <div class="icon">${a.icon}</div>
      <div class="name">${a.display_name}</div>
      <div class="tag">${a.category}</div>
    </div>
  `).join('') + '</div>';
}

async function toggleStore() {
  const ov = document.getElementById('storeOverlay');
  if (!ov.classList.contains('show')) {
    ov.classList.add('show');
    try { catalog = await apiFetch('/api/apps/catalog'); } catch { catalog = []; }
    renderStore();
  } else {
    ov.classList.remove('show');
  }
}

function renderStore() {
  const sl = document.getElementById('storeList');
  const installedIds = installed.map(a => a.app_id);
  if (catalog.length === 0) {
    sl.innerHTML = '<div class="empty" style="padding:40px 0"><div class="icon">🧩</div><h2>商店里没有应用</h2><p>请查看下方运行时诊断信息</p></div>';
    return;
  }
  sl.innerHTML = catalog.map(a => {
    const isInst = installedIds.includes(a.app_id);
    return `<div class="store-card">
      <div class="top"><div class="icon">${a.icon}</div><div class="info"><h3>${a.name}</h3><div class="author">${a.author}</div></div></div>
      <div class="desc">${a.description}</div>
      ${isInst
        ? `<button class="btn uninstall" onclick="doUninstall('${a.app_id}')">卸载</button>`
        : `<button class="btn install" onclick="doInstall('${a.app_id}')">安装</button>`}
    </div>`;
  }).join('');
}

async function doInstall(id) {
  try {
    await apiFetch(`/api/apps/install?app_id=${id}`, { method: 'POST' });
    await loadDesktop();
    catalog = await apiFetch('/api/apps/catalog');
    renderStore();
  } catch(e) { alert('安装失败: ' + e.message); }
}

async function doUninstall(id) {
  try {
    await apiFetch(`/api/apps/uninstall?app_id=${id}`, { method: 'POST' });
    await loadDesktop();
    catalog = await apiFetch('/api/apps/catalog');
    renderStore();
  } catch(e) { alert('卸载失败: ' + e.message); }
}

function openApp(id, name, icon) {
  activeApp = { id, name, icon };
  sessionId = null;
  document.getElementById('chatIcon').textContent = icon;
  document.getElementById('chatName').textContent = name;
  document.getElementById('chatBody').innerHTML = '<p class="start-text">开始对话吧 ✨</p>';
  document.getElementById('chatInput').value = '';
  document.getElementById('chatOverlay').classList.add('show');
}

function closeChat() {
  document.getElementById('chatOverlay').classList.remove('show');
  activeApp = null;
}

async function sendMsg() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg || !activeApp) return;
  input.value = '';
  input.disabled = true;

  const body = document.getElementById('chatBody');
  body.innerHTML += `<div class="msg user"><div class="bubble">${escapeHtml(msg)}</div></div>`;
  body.innerHTML += '<div class="msg assistant"><div class="bubble" id="streaming"></div></div>';
  body.scrollTop = body.scrollHeight;

  try {
    const res = await fetch(`${API}/api/chat/send`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ app_id: activeApp.id, message: msg, session_id: sessionId || undefined })
    });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const data = line.slice(6);
          try {
            const j = JSON.parse(data);
            if (j.session_id && !sessionId) sessionId = j.session_id;
            if (j.text) {
              document.getElementById('streaming').textContent += j.text;
              body.scrollTop = body.scrollHeight;
            }
          } catch {}
        }
      }
    }
    document.getElementById('streaming').id = '';
  } catch(e) {
    document.getElementById('streaming').textContent += '\n\n⚠️ 连接失败: ' + e.message;
  }
  input.disabled = false;
  input.focus();
}

function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

init();
</script>
</body>
</html>
